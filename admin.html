<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Área Restrita — Crafting Solutions</title>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body style="background:#0b1c24; color:#f9fbfd;">
  <main class="container" style="min-height:100vh; display:flex; align-items:center; justify-content:center; padding:40px 16px;">
    <div style="width:100%; max-width:420px; background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.14); border-radius:16px; padding:24px;">
      <h1 style="margin:0 0 8px 0;">Área restrita</h1>
      <p style="opacity:.85; margin:0 0 18px 0;">Área do Cliente e da Administração.</p>

      <label>Usuário</label>
      <input style="width:100%; padding:12px; margin:6px 0 12px; border-radius:10px; border:1px solid rgba(255,255,255,0.2); background:rgba(0,0,0,0.15); color:#fff;"/>

      <label>Senha</label>
      <input type="password" style="width:100%; padding:12px; margin:6px 0 18px; border-radius:10px; border:1px solid rgba(255,255,255,0.2); background:rgba(0,0,0,0.15); color:#fff;"/>

      <button class="button button--primary" onclick="alert('Área restrita em desenvolvimento.'); return false;">
        Entrar
      </button>
    </div>
  </main>
</body>
</html>
